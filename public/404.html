<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | HTML Editor</title>
  <meta name="description" content="The page you're looking for doesn't exist. Go back to HTML Editor and start building web pages." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://html-editor.replit.app/" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1e1e1e;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .code {
      font-size: 96px;
      font-weight: 800;
      color: #e34c26;
      line-height: 1;
      letter-spacing: -4px;
    }
    h1 {
      font-size: 24px;
      color: #e5a45a;
      margin: 16px 0 8px;
      font-weight: 600;
    }
    p {
      font-size: 15px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: #e34c26;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
    .sub {
      margin-top: 20px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br>Head back to HTML Editor and start building.</p>
    <a href="/">Go to HTML Editor</a>
    <p class="sub">You will be redirected automatically in <span id="count">5</span> seconds.</p>
  </div>
  <script>
    var n = 5;
    var el = document.getElementById('count');
    var t = setInterval(function() {
      n--;
      el.textContent = n;
      if (n <= 0) { clearInterval(t); location.href = '/'; }
    }, 1000);
  </script>
</body>
</html>
