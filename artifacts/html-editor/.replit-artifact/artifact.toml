kind = "web"
previewPath = "/"
title = "HTML Editor"
version = "1.0.0"
id = "artifacts/html-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21192

[services.development]
run = "pnpm run dev"

[services.production]
build = [ "pnpm", "run", "build" ]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21192"
BASE_PATH = "/"
